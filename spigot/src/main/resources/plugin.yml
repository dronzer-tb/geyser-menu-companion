name: GeyserMenuCompanion
version: ${version}
main: com.geysermenu.companion.spigot.GeyserMenuSpigot
api-version: '1.20'
author: kasniya
description: Companion plugin for GeyserMenu - API for sending menus to Bedrock players
softdepend:
  - floodgate
  - Essentials
  - EssentialsX

commands:
  geysermenu:
    description: GeyserMenu companion commands
    aliases: [gm, gmenu]
    permission: geysermenu.admin
    usage: /<command> [reload|status]
  gemu:
    description: Opens the GeyserMenu or reorder buttons
    usage: |
      /<command> - Opens the menu (Bedrock players only)
      /<command> p:<button_name> s:<position> - Reorder a button (admin only)

permissions:
  geysermenu.admin:
    description: Access to GeyserMenu admin commands and button reordering
    default: op
  geysermenu.command.menu:
    description: Permission to use /gemu to open the menu
    default: true
